server:
  port: 8080

spring:
  application:
    name: ai-open-platform
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_open_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aiopen.platform.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 自定义配置
ai-open:
  jwt:
    # 生产环境请改为足够长的随机字符串(>=32 字节),建议用环境变量覆盖
    secret: ${AIOPEN_JWT_SECRET:change-me-please-use-a-long-random-secret-key-2026}
    # 过期时间(毫秒),默认 7 天
    expire: 604800000
    header: Authorization
    prefix: "Bearer "

logging:
  level:
    com.aiopen.platform: debug
