# 使用预构建镜像一键启动,无需本地构建环境
# 用法: docker compose -f docker-compose.prebuilt.yml up -d
services:
  mysql:
    image: mysql:8.0
    container_name: aiopen-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_PASSWORD:-root}"
      MYSQL_DATABASE: ai_open_platform
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s

  app:
    image: tooplick/open-api:latest
    container_name: aiopen-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/ai_open_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD:-root}"
      AIOPEN_JWT_SECRET: "${AIOPEN_JWT_SECRET:-change-me-please-use-a-long-random-secret-key-2026}"
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-8321}:8321"

volumes:
  mysql-data:
